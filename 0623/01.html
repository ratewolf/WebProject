<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>

    <script>
    $(function () {
        let clearQueue = false;
        let goToEnd = false;

        $("#clearQueue").on("change", function () {
            clearQueue = $(this).prop("checked");
        });

        $("#goToEnd").on("change", function () {
            goToEnd = $(this).prop("checked");
        });

        $("#box").css({
            width: 100,
            height: 100,
            backgroundColor: "magenta"
        });

        function animationLoop() {
            $("#box")
                .animate({ width: 200 }, 1000)
                .delay(1000)
                .animate({ width: 100 }, 1000, animationLoop);
        }

        animationLoop();

        $("#stopBtn").on("click", function () {
            $("#box").stop(clearQueue, goToEnd);
        });
    });
    </script>
</head>
<body>
    <label>clearQueue</label>
    <input type="checkbox" id="clearQueue">
    <br>
    <label>goToEnd</label>
    <input type="checkbox" id="goToEnd">
    <br>
    <button id="stopBtn">Stop</button>
    <h1 id="box"></h1>
</body>
</html>
