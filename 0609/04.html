<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>

    <script>
        $(document).ready(function(){
            let imgPath = $("#img1").attr("src");
            $("h2").text(imgPath);
            $("h2").css("color", "white");
            $("h2").css("background", "black");
            $("h2").css("width", "200px");
        });
    </script>
</head>
<body>
    <img src="./imgs/coin1.jpg" alt="동전 이미지 1" id="img1" width="400" height="300"><br><br>
    <h2></h2>
</body>
</html>
