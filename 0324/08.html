<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록</title>
</head>
<body>
    <h3>순서가 없는 목록</h3>
    <ul type="circle"> <!-- disc(default) | circle | square -->
        <li>사과</li>
        <li>딸기</li>
        <li>금귤</li>
        <li>천혜향</li>
    </ul>
    <h3>순서가 있는 목록</h3>
    <ol type="i"> <!-- 1(default) | A | a | I | i -->
        <li>사과</li>
        <li>딸기</li>
        <li>금귤</li>
        <li>천혜향</li>
    </ol>
</body>
</html>
