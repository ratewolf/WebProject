<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id와 Class 실험</title>

    <style>
        .header{
            width:160px;
            line-height:80px;
            color: #ffffff;
        }
        .title{
            font-size:20px;
            font-weight: 400;
        }
        .center{
            margin: 0 auto;
            text-align: center;
        }
        .bg-red{
            background:red;
        }
        .menu{
            margin: 0;
            padding: 0;
        }
        .list{
            font-size:13px;
            color: #66a1f4;
        }
    </style>
</head>
<body>
    <div class="header title center bg-red">
        폴리텍
    </div>
    <ul class="menu">
        <li class="list">메뉴1</li>
        <li class="list">메뉴2</li>
        <li class="list">메뉴3</li>
    </ul>
</body>
</html>
