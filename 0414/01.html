<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 Selector Basic(상태선택자)</title>
    <!-- 상태선택자 -->
    <style>
        input:enabled {
            background-color: rgb(203, 243, 56);
        }
        input:disabled {
            background-color: #E0115F;
        }
        input:focus {
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <h1>사용 가능한 상태</h1>
    <input type="text"><br><br>
    <h1>사용 불가능한 상태</h1>
    <input type="text" disabled="disabled"><br><br>
</body>
</html>
