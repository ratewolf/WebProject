<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 Selector Basic(구조선택자)</title>
    <!-- 구조 선택자 -->
    <style>
        ul {
            overflow: hidden;
        }
        li {
            list-style: none;
            float: left;
            width: 100px;
            padding: 15px;
            color: #ffffff;
            font-weight: bold;
            text-align: center;
        }
        li:first-child {
            border-radius: 10px 0 0 10px;
        }
        li:last-child {
            border-radius: 0 10px 10px 0;
        }
        li:nth-child(2n) {
            background-color: #FF0003;
        }
        li:nth-child(2n+1) {
            background-color: #800000;
        }
    </style>
</head>
<body>
    <ul>
        <li>첫 번째</li>
        <li>두 번째</li>
        <li>세 번째</li>
        <li>네 번째</li>
        <li>다섯 번째</li>
        <li>여섯 번째</li>
        <li>일곱 번째</li>
    </ul>
</body>
</html>
