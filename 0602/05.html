<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1초 간격으로 익명함수를 호출하는 문자열 시계</title>
    <script>
        window.onload = function() {
            let clock = document.getElementById("clock");

            // 1초마다 익명함수 호출
            setInterval(function() {
                let now = new Date();
                let year = now.getFullYear();
                let month = now.getMonth() + 1;
                let day = now.getDay();
                let hours = now.getHours();
                let minutes = now.getMinutes();
                let seconds = now.getSeconds();

                clock.innerText = `${year}년 ${month}월 ${day}일 ${hours}:${minutes}:${seconds}`
                // clock.innerText = year + "년 " + month + "월 " + day + "일 " + hours + ":" + minutes + ":" + seconds;
                // clock.innerText = now.getFullYear() + "년 " + (now.getMonth() + 1) + "월 " + now.getDay() + "일 " + now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
            }, 1000)
        }
    </script>
</head>
<body>
    <h1 id="clock"></h1>
</body>
</html>
