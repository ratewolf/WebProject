<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        const PI = Math.PI;
        function circleCalc(radius) {
            let circum = 2 * PI * radius;
            let area = PI * Math.pow(radius, 2);

            alert("반지름이" + radius + "인 원의 둘레: " + circum + "cm");
            alert("반지름이" + radius + "인 원의 넓이: " + area + "㎠");
        }
        
        circleCalc(8)
    </script>
</head>

</body>
</html>
