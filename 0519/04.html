    <script>
        let radius = 7;
        const PI = Math.PI;
        let circum = 2 * PI * radius;
        alert("원의 둘레: " + circum + "cm");

        let area = PI * Math.pow(radius, 2);
        alert("원의 넓이: " + area + "㎠");
    </script>
