<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        tbody tr td {
            text-align: center;
        }
    </style>
</head>
<body>
    <form action="01.html" method="post">
        <fieldset>
            <legend>회원가입</legend>
            <table width="500px">
                <thead>
                    <tr>
                        <th>주제</th>
                        <th>입력</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th><label for="name">성명</label></th>
                        <td><input type="text" id="name" name="name"/></td>
                    </tr>
                    <tr>
                        <th><label for="email">이메일</label></th>
                        <td><input type="email" id="email" name="email"/></td>
                    </tr>
                    <tr>
                        <th><label for="addr">주소</label></th>
                        <td><input type="text" id="addr" name="addr"></td>
                    </tr>
                    <tr>
                        <th>성별</th>
                        <td>
                            <input type="radio" name="gender" value="남성">남성&nbsp;&nbsp;
                            <input type="radio" name="gender" value="여성">여성
                        </td>
                    </tr>
                    <tr>
                        <th>취미</th>
                        <td>
                            <input type="checkbox" name="hobby1" value="독서">독서 &nbsp;&nbsp;
                            <input type="checkbox" name="hobby2" value="음악">음악 &nbsp;&nbsp;
                            <input type="checkbox" name="hobby3" value="스포츠">스포츠
                        </td>
                    </tr>
                    <tr>
                        <th>남기고 싶은 말</th>
                        <td>
                            <textarea name="message" cols="30" rows="5">기타 하고 싶은 말이 있으면 여기에 입력하세요.</textarea>
                        </td>
                    </tr>
                    <tr>
                        <th>버튼</th>
                        <td>
                            <input type="submit" value="가입하기"> &nbsp;&nbsp;
                            <input type="reset" value="입력초기화">
                        </td>
                    </tr>
                </tbody>
            </table>
        </fieldset>
    </form>
</body>
</html>
