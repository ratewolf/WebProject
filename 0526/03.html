<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선언적 함수와 익명함수 실행 우선순위</title>
    <script>
        // 선언적 함수 선언
        function ananymousFunc() {
            alert("1> 선언적 함수입니다.");
        }

        // 같은 이름의 익명함수 선언
        ananymousFunc = function() {
            alert("2> 익명함수입니다.");
        }

        // alert(typeof(ananymousFunc) + "\n:" + ananymousFunc);
    </script>
</head>
<body>
    <button onclick="ananymousFunc()">함수 호출</button>
</body>
</html>
